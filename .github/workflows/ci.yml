name: CI

on:
  push:
    branches: [main, "phase4/**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      COMPLIANCE_JWT_SECRET: ci-jwt-secret-0123456789abcdef0123456789abcd
      COMPLIANCE_APP_ENV: development
      COMPLIANCE_LLM_PROVIDER: template
      COMPLIANCE_USE_DEMO_INDEX: "true"
      COMPLIANCE_RATE_LIMIT_AUTH: 1000/minute
      COMPLIANCE_RATE_LIMIT_UPLOAD: 1000/minute
      COMPLIANCE_RATE_LIMIT_ANALYZE: 1000/minute
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.110" "uvicorn[standard]>=0.27" \
            "pydantic>=2.6" "pydantic-settings>=2.2" \
            "sqlalchemy>=2.0" "PyJWT>=2.8" "python-multipart>=0.0.9" \
            "slowapi>=0.1.9" "pytest>=8.0" "httpx>=0.27" \
            "numpy>=1.24" "requests>=2.31" "alembic>=1.13" "beautifulsoup4>=4.12"
      - name: Run pytest
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
